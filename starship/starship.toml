[git_commit]
only_detached = true
format = "[î‚±](fg:subsep bg:seg_bg)[ @$hash ]($style)"
style = "fg:vcs_clean bg:seg_bg"
commit_hash_length = 8

[git_status]
format = "([~$conflicted ](fg:vcs_conflict bg:seg_bg))([+$staged ](fg:vcs_mod bg:seg_bg))([!$modified ](fg:vcs_mod bg:seg_bg))([?$untracked ](fg:vcs_untracked bg:seg_bg))([$stashed ](fg:vcs_clean bg:seg_bg))([$ahead_behind ](fg:vcs_clean bg:seg_bg))([آ»$renamed ](fg:vcs_mod bg:seg_bg))([âœک$deleted ](fg:vcs_conflict bg:seg_bg))"
conflicted = "${count}"
ahead = "â‡،${count}"
behind = "â‡£${count}"
