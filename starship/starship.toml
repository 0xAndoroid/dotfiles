add_newline = false
command_timeout = 500
scan_timeout = 30
palette = "p10k"

format = """
[‚ē≠‚ĒÄ](fg:frame)\
$os\
$hostname\
${custom.path}\
${custom.git_branch}\
$git_commit\
$git_status\
$git_state\
[Óāį](fg:seg_bg)\
$fill\
[Óā≤](fg:seg_bg)\
$status\
$cmd_duration\
$jobs\
$direnv\
${custom.kubernetes}\
$terraform\
${custom.aws}\
${custom.gcloud}\
$azure\
$nix_shell\
${custom.username}\
$time\
[‚ĒÄ‚ēģ](fg:frame)
[‚ēį‚ĒÄ ](fg:frame)"""

[palettes.p10k]
frame = "#585858"
subsep = "#808080"
seg_bg = "black"
os_fg = "white"
dir_fg = "blue"
dir_sh = "#8787af"
vcs_meta = "white"
vcs_clean = "green"
vcs_mod = "yellow"
vcs_untracked = "blue"
vcs_conflict = "red"
status_ok = "green"
status_err = "red"
duration = "blue"
jobs_fg = "#00afaf"
direnv_fg = "#d7af00"
time_fg = "blue"
prompt_ok = "#5fd700"
prompt_err = "#ff0000"

[fill]
symbol = " "
style = ""

[os]
disabled = false
format = "[ $symbol  ](fg:os_fg bg:seg_bg)"

[os.symbols]
Macos = "ÔÖĻ"
Linux = "ÔÖľ"
Ubuntu = "ÔĆõ"
Debian = "ÔĆÜ"
Arch = "ÔĆÉ"
Fedora = "ÔĆä"
Alpine = "ÔĆÄ"
Windows = "ÔÖļ"

[directory]
disabled = true

[custom.path]
description = "Home/folder icon; path shortens by dropping leading components when it exceeds COLUMNS/3."
when = "true"
shell = ["sh", "--noprofile", "--norc"]
command = '''
case "$PWD" in
  "$HOME") icon='ÔÄē'; disp='~' ;;
  "$HOME"/*) icon='ÔĀľ'; disp="~${PWD#$HOME}" ;;
  *) icon='ÔĀľ'; disp="$PWD" ;;
esac
cols=${COLUMNS:-100}
max=$(( cols / 3 ))
[ "$max" -lt 12 ] && max=12
[ "$max" -gt 60 ] && max=60
if [ ${#disp} -gt "$max" ]; then
  tail=$disp
  while [ ${#tail} -gt "$max" ] && [ "${tail#*/}" != "$tail" ]; do
    tail=${tail#*/}
  done
  disp="‚Ä¶/$tail"
fi
printf '%s %s' "$icon" "$disp"
'''
format = "[ÓāĪ](fg:subsep bg:seg_bg)[ $output ](fg:dir_fg bold bg:seg_bg)"

[git_branch]
disabled = true

[custom.git_branch]
description = "Git branch; hidden below 80 cols or in detached HEAD."
when = '''
[ "${COLUMNS:-100}" -ge 80 ] || exit 1
git rev-parse --is-inside-work-tree >/dev/null 2>&1
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
ref=$(git symbolic-ref --short HEAD 2>/dev/null) || exit 0
max=32
if [ ${#ref} -gt $max ]; then
  ref="$(printf '%s' "$ref" | cut -c1-$((max-1)))‚Ä¶"
fi
printf '%s' "$ref"
'''
style = "fg:vcs_clean bg:seg_bg"
format = "[](fg:subsep bg:seg_bg)[ ÔĄ¶ $output ]($style)"

[git_commit]
only_detached = true
format = "[ÓāĪ](fg:subsep bg:seg_bg)[ @$hash ]($style)"
style = "fg:vcs_clean bg:seg_bg"
commit_hash_length = 8

[git_status]
format = "([~$conflicted ](fg:vcs_conflict bg:seg_bg))([+$staged ](fg:vcs_mod bg:seg_bg))([!$modified ](fg:vcs_mod bg:seg_bg))([?$untracked ](fg:vcs_untracked bg:seg_bg))([$stashed ](fg:vcs_clean bg:seg_bg))([$ahead_behind ](fg:vcs_clean bg:seg_bg))([¬Ľ$renamed ](fg:vcs_mod bg:seg_bg))([‚úė$deleted ](fg:vcs_conflict bg:seg_bg))"
conflicted = "${count}"
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚á£${behind_count}‚á°${ahead_count}"
up_to_date = ""
untracked = "${count}"
stashed = "*${count}"
modified = "${count}"
staged = "${count}"
renamed = "${count}"
deleted = "${count}"

[git_state]
style = "fg:vcs_conflict bg:seg_bg"
format = "[ÓāĪ](fg:subsep bg:seg_bg)[ $state( $progress_current/$progress_total) ]($style)"

[status]
disabled = false
format = "[ $symbol ](bg:seg_bg)"
success_symbol = "[‚úĒ](fg:status_ok bg:seg_bg)"
symbol = "[‚úė](fg:status_err bg:seg_bg)"
signal_symbol = "[‚úė](fg:status_err bg:seg_bg)"
not_found_symbol = "[‚úė](fg:status_err bg:seg_bg)"
not_executable_symbol = "[‚úė](fg:status_err bg:seg_bg)"
recognize_signal_code = true
map_symbol = false

[cmd_duration]
min_time = 3000
show_milliseconds = false
style = "fg:duration bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ $duration ]($style)"

[jobs]
symbol = "‚ú¶"
style = "fg:jobs_fg bg:seg_bg"
number_threshold = 1
format = "[Óā≥](fg:subsep bg:seg_bg)[ $symbol$number ]($style)"

[direnv]
disabled = false
style = "fg:direnv_fg bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ direnv ]($style)"
symbol = ""
loaded_msg = ""
unloaded_msg = ""
allowed_msg = ""
not_allowed_msg = ""
denied_msg = ""

[kubernetes]
disabled = true

[terraform]
disabled = false
style = "fg:#af87d7 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ ‚óÜ $workspace ]($style)"

[aws]
disabled = true

[gcloud]
disabled = true

[custom.kubernetes]
description = "Kubernetes current-context; hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
cfg=${KUBECONFIG:-$HOME/.kube/config}
oldifs=$IFS; IFS=:
for f in $cfg; do
  IFS=$oldifs
  [ -f "$f" ] && awk '/^current-context:/{print $2}' "$f" | grep -q . && exit 0
  IFS=:
done
exit 1
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
cfg=${KUBECONFIG:-$HOME/.kube/config}
oldifs=$IFS; IFS=:
for f in $cfg; do
  IFS=$oldifs
  [ -f "$f" ] || { IFS=:; continue; }
  ctx=$(awk '/^current-context:/{print $2; exit}' "$f")
  [ -n "$ctx" ] && { printf '%s' "$ctx"; exit; }
  IFS=:
done
'''
style = "fg:#81a1c1 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ ‚éą $output ]($style)"

[custom.aws]
description = "AWS profile; hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
[ -n "${AWS_VAULT:-${AWS_PROFILE:-$AWS_DEFAULT_PROFILE}}" ]
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
printf '%s' "${AWS_VAULT:-${AWS_PROFILE:-$AWS_DEFAULT_PROFILE}}"
'''
style = "fg:#d79921 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ ‚ėĀ $output ]($style)"

[custom.gcloud]
description = "GCP account (local-part); hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
cfg=$(cat "$HOME/.config/gcloud/active_config" 2>/dev/null) || exit 1
[ -z "$cfg" ] && exit 1
f="$HOME/.config/gcloud/configurations/config_$cfg"
[ -f "$f" ] && grep -q '^account' "$f"
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
cfg=$(cat "$HOME/.config/gcloud/active_config" 2>/dev/null)
f="$HOME/.config/gcloud/configurations/config_$cfg"
awk -F' *= *' '/^account/{print $2; exit}' "$f" 2>/dev/null | cut -d@ -f1
'''
style = "fg:#458588 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ ÔÜ† $output ]($style)"

[azure]
disabled = false
style = "fg:#0078d4 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ ÓĮė $subscription ]($style)"

[nix_shell]
disabled = false
style = "fg:#4a90e2 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ ‚ĚĄ $state ]($style)"

[username]
disabled = true

[custom.username]
description = "Login user on SSH or root; hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
[ -n "$SSH_CONNECTION" ] || [ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ] || [ "$(id -u)" = 0 ]
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
if [ "$(id -u)" = 0 ]; then
  printf '%s' "${USER:-root}"
else
  printf '%s' "${USER:-$LOGNAME}"
fi
'''
style = "fg:#aaaa80 bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ $output ]($style)"

[hostname]
ssh_only = true
style = "fg:#aaaa80 bg:seg_bg"
format = "[ÓāĪ](fg:subsep bg:seg_bg)[ @$hostname ]($style)"
trim_at = "."

[time]
disabled = false
time_format = "%T"
style = "fg:time_fg bg:seg_bg"
format = "[Óā≥](fg:subsep bg:seg_bg)[ $time ]($style)"
utc_time_offset = "local"

[character]
disabled = true

