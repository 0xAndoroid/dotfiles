[custom.path]
description = "Home icon when PWD is $HOME, folder icon otherwise"
when = "true"
shell = ["sh", "--noprofile", "--norc"]
command = '''
case "$PWD" in
  "$HOME") printf 'ï€• ~' ;;
  "$HOME"/*) printf 'ïپ¼ ~%s' "${PWD#$HOME}" ;;
  *) printf 'ïپ¼ %s' "$PWD" ;;
esac
'''
format = "[î‚±](fg:subsep bg:seg_bg)[ $output ](fg:dir_fg bold bg:seg_bg)"

[git_branch]
symbol = "ï„¦ "
style = "fg:vcs_clean bg:seg_bg"
