add_newline = false
command_timeout = 500
scan_timeout = 30
palette = "p10k"

format = """
[в•ӯв”Җ](fg:frame)\
$hostname\
$os\
${custom.path}\
$git_branch\
$git_commit\
$git_status\
$git_state\
[оӮ°](fg:seg_bg)\
$fill\
[оӮІ](fg:seg_bg)\
$status\
$cmd_duration\
$jobs\
$direnv\
${custom.kubernetes}\
$terraform\
${custom.aws}\
${custom.gcloud}\
$azure\
$nix_shell\
$username\
$time\
[в”Җв•®](fg:frame)
[в•°в”Җ ](fg:frame)"""

[palettes.p10k]
frame = "#585858"
subsep = "#808080"
seg_bg = "black"
os_fg = "white"
dir_fg = "blue"
dir_sh = "#8787af"
vcs_meta = "white"
vcs_clean = "green"
vcs_mod = "yellow"
vcs_untracked = "blue"
vcs_conflict = "red"
status_ok = "green"
status_err = "red"
duration = "blue"
jobs_fg = "#00afaf"
direnv_fg = "#d7af00"
time_fg = "blue"
prompt_ok = "#5fd700"
prompt_err = "#ff0000"

[fill]
symbol = " "
style = ""

[os]
disabled = false
format = "[ $symbol  ](fg:os_fg bg:seg_bg)"

[os.symbols]
Macos = "п…№"
Linux = "п…ј"
Ubuntu = "пҢӣ"
Debian = "пҢҶ"
Arch = "пҢғ"
Fedora = "пҢҠ"
Alpine = "пҢҖ"
Windows = "п…ә"

[directory]
disabled = true

[custom.path]
description = "Home/folder icon; path shortens by dropping leading components when it exceeds COLUMNS/3."
when = "true"
shell = ["sh", "--noprofile", "--norc"]
command = '''
case "$PWD" in
  "$HOME") icon='пҖ•'; disp='~' ;;
  "$HOME"/*) icon='пҒј'; disp="~${PWD#$HOME}" ;;
  *) icon='пҒј'; disp="$PWD" ;;
esac
cols=${COLUMNS:-100}
max=$(( cols / 3 ))
[ "$max" -lt 12 ] && max=12
[ "$max" -gt 60 ] && max=60
if [ ${#disp} -gt "$max" ]; then
  tail=$disp
  while [ ${#tail} -gt "$max" ] && [ "${tail#*/}" != "$tail" ]; do
    tail=${tail#*/}
  done
  disp="вҖҰ/$tail"
fi
printf '%s %s' "$icon" "$disp"
'''
format = "[оӮұ](fg:subsep bg:seg_bg)[ $output ](fg:dir_fg bold bg:seg_bg)"

[git_branch]
symbol = "п„Ұ "
style = "fg:vcs_clean bg:seg_bg"
format = "[оӮұ](fg:subsep bg:seg_bg)[ $symbol$branch ]($style)"
truncation_length = 32
truncation_symbol = "вҖҰ"

[git_commit]
only_detached = true
format = "[оӮұ](fg:subsep bg:seg_bg)[ @$hash ]($style)"
style = "fg:vcs_clean bg:seg_bg"
commit_hash_length = 8

[git_status]
format = "([~$conflicted ](fg:vcs_conflict bg:seg_bg))([+$staged ](fg:vcs_mod bg:seg_bg))([!$modified ](fg:vcs_mod bg:seg_bg))([?$untracked ](fg:vcs_untracked bg:seg_bg))([$stashed ](fg:vcs_clean bg:seg_bg))([$ahead_behind ](fg:vcs_clean bg:seg_bg))([В»$renamed ](fg:vcs_mod bg:seg_bg))([вңҳ$deleted ](fg:vcs_conflict bg:seg_bg))"
conflicted = "${count}"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮЈ${behind_count}вҮЎ${ahead_count}"
up_to_date = ""
untracked = "${count}"
stashed = "*${count}"
modified = "${count}"
staged = "${count}"
renamed = "${count}"
deleted = "${count}"

[git_state]
style = "fg:vcs_conflict bg:seg_bg"
format = "[оӮұ](fg:subsep bg:seg_bg)[ $state( $progress_current/$progress_total) ]($style)"

[status]
disabled = false
format = "[ $symbol ](bg:seg_bg)"
success_symbol = "[вң”](fg:status_ok bg:seg_bg)"
symbol = "[вңҳ](fg:status_err bg:seg_bg)"
signal_symbol = "[вңҳ](fg:status_err bg:seg_bg)"
not_found_symbol = "[вңҳ](fg:status_err bg:seg_bg)"
not_executable_symbol = "[вңҳ](fg:status_err bg:seg_bg)"
recognize_signal_code = true
map_symbol = false

[cmd_duration]
min_time = 3000
show_milliseconds = false
style = "fg:duration bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ $duration ]($style)"

[jobs]
symbol = "вңҰ"
style = "fg:jobs_fg bg:seg_bg"
number_threshold = 1
format = "[оӮі](fg:subsep bg:seg_bg)[ $symbol$number ]($style)"

[direnv]
disabled = false
style = "fg:direnv_fg bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ direnv ]($style)"
symbol = ""
loaded_msg = ""
unloaded_msg = ""
allowed_msg = ""
not_allowed_msg = ""
denied_msg = ""

[kubernetes]
disabled = true

[terraform]
disabled = false
style = "fg:#af87d7 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ в—Ҷ $workspace ]($style)"

[aws]
disabled = true

[gcloud]
disabled = true

[custom.kubernetes]
description = "Kubernetes current-context; hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
cfg=${KUBECONFIG:-$HOME/.kube/config}
oldifs=$IFS; IFS=:
for f in $cfg; do
  IFS=$oldifs
  [ -f "$f" ] && awk '/^current-context:/{print $2}' "$f" | grep -q . && exit 0
  IFS=:
done
exit 1
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
cfg=${KUBECONFIG:-$HOME/.kube/config}
oldifs=$IFS; IFS=:
for f in $cfg; do
  IFS=$oldifs
  [ -f "$f" ] || { IFS=:; continue; }
  ctx=$(awk '/^current-context:/{print $2; exit}' "$f")
  [ -n "$ctx" ] && { printf '%s' "$ctx"; exit; }
  IFS=:
done
'''
style = "fg:#81a1c1 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ вҺҲ $output ]($style)"

[custom.aws]
description = "AWS profile; hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
[ -n "${AWS_VAULT:-${AWS_PROFILE:-$AWS_DEFAULT_PROFILE}}" ]
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
printf '%s' "${AWS_VAULT:-${AWS_PROFILE:-$AWS_DEFAULT_PROFILE}}"
'''
style = "fg:#d79921 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ вҳҒ $output ]($style)"

[custom.gcloud]
description = "GCP account (local-part); hidden below 100 cols."
when = '''
[ "${COLUMNS:-100}" -ge 100 ] || exit 1
cfg=$(cat "$HOME/.config/gcloud/active_config" 2>/dev/null) || exit 1
[ -z "$cfg" ] && exit 1
f="$HOME/.config/gcloud/configurations/config_$cfg"
[ -f "$f" ] && grep -q '^account' "$f"
'''
shell = ["sh", "--noprofile", "--norc"]
command = '''
cfg=$(cat "$HOME/.config/gcloud/active_config" 2>/dev/null)
f="$HOME/.config/gcloud/configurations/config_$cfg"
awk -F' *= *' '/^account/{print $2; exit}' "$f" 2>/dev/null | cut -d@ -f1
'''
style = "fg:#458588 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ пҶ  $output ]($style)"

[azure]
disabled = false
style = "fg:#0078d4 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ оҜҳ $subscription ]($style)"

[nix_shell]
disabled = false
style = "fg:#4a90e2 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ вқ„ $state ]($style)"

[username]
show_always = false
style_user = "fg:#aaaa80 bg:seg_bg"
style_root = "fg:#d7af00 bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ $user ]($style)"

[hostname]
ssh_only = true
style = "fg:#aaaa80 bg:seg_bg"
format = "[ @$hostname ]($style)[оӮұ](fg:subsep bg:seg_bg)"
trim_at = "."

[time]
disabled = false
time_format = "%T"
style = "fg:time_fg bg:seg_bg"
format = "[оӮі](fg:subsep bg:seg_bg)[ $time ]($style)"
utc_time_offset = "local"

[character]
disabled = true

[package]
disabled = true
[nodejs]
disabled = true
[python]
