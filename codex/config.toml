commit_attribution = ""
include_permissions_instructions = false
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
project_doc_fallback_filenames = ["CLAUDE.md"]
service_tier = "fast"
suppress_unstable_features_warning = true

[analytics]
enabled = false

[features]
codex_hooks = true
apps = false
goals = true
multi_agent_v2 = true

[feedback]
enabled = false

[mcp_servers.perplexity]
args = ["-y", "@perplexity-ai/mcp-server"]
command = "npx"
env_vars = ["PERPLEXITY_API_KEY"]

[projects."$HOME/dev/pika"]
trust_level = "trusted"

[projects."/Users/atretyakov/.dotfiles"]
trust_level = "trusted"

[projects."/Users/atretyakov/dev/jolt"]
trust_level = "trusted"

[projects."/Users/atretyakov/dev/bolt"]
trust_level = "trusted"

[projects."/Users/atretyakov/dev/dory"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/pokernow-autorange"]
trust_level = "trusted"

[projects."/Users/andoroid/.dotfiles"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/yabai"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/jolt"]
trust_level = "trusted"

[tui]
alternate_screen = "never"
notifications = ["agent-turn-complete"]
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "context-remaining",
  "context-window-size",
]

[tui.model_availability_nux]
"gpt-5.5" = 4

# BEGIN ZELLAUDE HOOKS
[[hooks.SessionStart]]
matcher = "startup|resume"
[[hooks.SessionStart.hooks]]
type = "command"
command = "${HOME}/.config/zellij/plugins/codex-hook.sh"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "${HOME}/.config/zellij/plugins/codex-hook.sh"

[[hooks.PreToolUse]]
[[hooks.PreToolUse.hooks]]
type = "command"
command = "${HOME}/.config/zellij/plugins/codex-hook.sh"

[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "${HOME}/.config/zellij/plugins/codex-hook.sh"

[[hooks.PermissionRequest]]
[[hooks.PermissionRequest.hooks]]
type = "command"
command = "${HOME}/.config/zellij/plugins/codex-hook.sh"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "${HOME}/.config/zellij/plugins/codex-hook.sh"
# END ZELLAUDE HOOKS
