commit_attribution = ""
include_permissions_instructions = false
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
project_doc_fallback_filenames = ["CLAUDE.md"]
suppress_unstable_features_warning = true
service_tier = "fast"

[analytics]
enabled = false

[features]
hooks = true
apps = false
goals = true
multi_agent_v2 = { enabled = true, max_concurrent_threads_per_session = 10 }
js_repl = false
workspace_dependencies = false

[feedback]
enabled = false

[mcp_servers.perplexity]
args = ["-y", "@perplexity-ai/mcp-server"]
command = "npx"
env_vars = ["PERPLEXITY_API_KEY"]

[mcp_servers.pika]
url = "http://100.81.62.125:7479/mcp"
bearer_token_env_var = "PIKA_DELEGATION_TOKEN"
tool_timeout_sec = 360

[projects."$HOME/dev/pika"]
trust_level = "trusted"

[projects."/Users/atretyakov/.dotfiles"]
trust_level = "trusted"

[projects."/Users/atretyakov/dev/jolt"]
trust_level = "trusted"

[projects."/Users/atretyakov/dev/bolt"]
trust_level = "trusted"

[projects."/Users/atretyakov/dev/dory"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/pokernow-autorange"]
trust_level = "trusted"

[projects."/Users/andoroid/.dotfiles"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/yabai"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/jolt"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/pika"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/issw"]
trust_level = "trusted"

[projects."/Users/andoroid/dev/calorie-tracker"]
trust_level = "trusted"

[tui]
alternate_screen = "never"
notifications = ["agent-turn-complete"]
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "context-remaining",
  "context-window-size",
]

[tui.model_availability_nux]
"gpt-5.5" = 4

[[hooks.PreToolUse]]
matcher = "Bash"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "${HOME}/.dotfiles/claude/hooks/enforce-uv.sh"
timeout = 5
